<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grid EA Calculator</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #020617; color: #e2e8f0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
    main { max-width: 1180px; margin: 0 auto; padding: 24px; }
    h1 { margin: 0 0 24px; padding-bottom: 16px; border-bottom: 1px solid #1e293b; color: white; }
    h2 { margin: 0 0 16px; color: white; font-size: 18px; }
    label { display: block; margin: 12px 0 6px; color: #94a3b8; font-size: 13px; }
    input, select, button { width: 100%; border-radius: 10px; border: 1px solid #334155; background: #020617; color: #f8fafc; padding: 10px 12px; font: inherit; }
    button { cursor: pointer; background: #1e293b; }
    button.active { background: #2563eb; border-color: #3b82f6; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #1e293b; text-align: right; }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align: left; }
    th { position: sticky; top: 0; background: #020617; color: #94a3b8; font-size: 12px; }
    .grid { display: grid; grid-template-columns: 340px 1fr; gap: 24px; align-items: start; }
    .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 18px; margin-bottom: 18px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .metric strong { display: block; margin-top: 4px; color: white; font-size: 22px; }
    .safe { border-color: #047857; background: #022c22; }
    .danger { border-color: #991b1b; background: #450a0a; }
    .muted { color: #94a3b8; }
    .sweep-row { display: grid; grid-template-columns: 1fr 44px; gap: 8px; margin-top: 8px; }
    .sweep { color: #c084fc; font-weight: 700; }
    .table-wrap { max-height: 620px; overflow: auto; }
    .error { color: #fca5a5; }
    @media (max-width: 860px) { main { padding: 14px; } .grid, .metrics { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>Grid EA Calculator</h1>
    <div class="grid">
      <section>
        <div class="card">
          <h2>ตั้งค่าโซน Grid</h2>
          <label>Max Buy Price</label><input id="maxPrice" type="number" value="85">
          <label>Min Buy Price</label><input id="minPrice" type="number" value="45">
          <label>Grid Mode</label>
          <div class="row">
            <button id="modeUsd" class="active" type="button">USD</button>
            <button id="modePct" type="button">%</button>
          </div>
          <label>Grid Spacing</label><input id="gridSpacing" type="number" value="0.5" step="0.1">
          <label>Price Decimals</label><input id="priceDecimals" type="number" value="2" min="0" max="8">
        </div>

        <div class="card">
          <h2>ขนาดสัญญา & ทุน</h2>
          <label>Size Type</label>
          <div class="row">
            <button id="sizeContracts" class="active" type="button">Contracts/grid</button>
            <button id="sizeUsd" type="button">USD/grid</button>
          </div>
          <label>ขนาดต่อ 1 Grid</label><input id="sizeValue" type="number" value="1.0" step="0.01">
          <label>Total Margin (USD)</label><input id="totalMargin" type="number" value="5000">
        </div>

        <div class="card">
          <h2>รวบโซน (Sweep)</h2>
          <label><input id="enableSweep" type="checkbox" checked style="width:auto"> เปิดใช้รวบโซน</label>
          <div id="sweeps"></div>
          <button id="addSweep" type="button" style="margin-top:10px">เพิ่มจุดรวบโซนใหม่</button>
        </div>
      </section>

      <section>
        <div id="message" class="card"></div>
        <div class="metrics">
          <div class="card metric"><span class="muted">Total Grids</span><strong id="mGrids">0</strong></div>
          <div class="card metric"><span class="muted">Max Contracts</span><strong id="mContracts">0</strong></div>
          <div class="card metric"><span class="muted">Total Value</span><strong id="mValue">$0.00</strong></div>
          <div class="card metric"><span class="muted">Avg Entry</span><strong id="mAvg">0</strong></div>
        </div>
        <div class="card">
          <h2>Simulated Execution Flow</h2>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Line #</th><th>Grid Level</th><th>Exec Price</th><th>Size Added</th><th>Cum Size</th><th>Avg Entry</th></tr></thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    let gridMode = 'usd';
    let sizeType = 'contracts';
    let sweeps = [{ id: 1, price: '65' }];

    const $ = (id) => document.getElementById(id);
    const num = (id) => parseFloat($(id).value);
    const fmt = (value, decimals = 4) => Number(value || 0).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
    const usd = (value) => '$' + Number(value || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    function setMode(mode) {
      gridMode = mode;
      $('modeUsd').classList.toggle('active', mode === 'usd');
      $('modePct').classList.toggle('active', mode === 'pct');
      calculate();
    }

    function setSize(type) {
      sizeType = type;
      $('sizeContracts').classList.toggle('active', type === 'contracts');
      $('sizeUsd').classList.toggle('active', type === 'usd');
      calculate();
    }

    function renderSweeps() {
      $('sweeps').innerHTML = sweeps.map((s, i) => `
        <div class="sweep-row">
          <input type="number" value="${s.price}" placeholder="Sweep price" data-id="${s.id}">
          <button type="button" data-remove="${s.id}">×</button>
        </div>
      `).join('');

      $('sweeps').querySelectorAll('input').forEach((input) => {
        input.addEventListener('input', () => {
          const item = sweeps.find((s) => s.id == input.dataset.id);
          if (item) item.price = input.value;
          calculate();
        });
      });

      $('sweeps').querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          sweeps = sweeps.filter((s) => s.id != button.dataset.remove);
          renderSweeps();
          calculate();
        });
      });
    }

    function calculate() {
      const max = num('maxPrice'), min = num('minPrice'), spacing = num('gridSpacing');
      const size = num('sizeValue'), margin = num('totalMargin'), decimals = parseInt($('priceDecimals').value, 10);
      const bad = (message) => {
        $('message').className = 'card danger';
        $('message').innerHTML = `<strong class="error">${message}</strong>`;
        $('rows').innerHTML = '';
      };

      if ([max, min, spacing, size, margin, decimals].some(Number.isNaN)) return bad('กรุณากรอกตัวเลขให้ครบถ้วนเพื่อเริ่มคำนวณ');
      if (spacing <= 0) return bad('ระยะห่าง Grid ต้องมากกว่า 0');
      if (max <= min) return bad('Max Buy Price ต้องมากกว่า Min Buy Price');
      if (size <= 0) return bad('จำนวนต่อ Grid ต้องมากกว่า 0');
      if (decimals < 0 || decimals > 8) return bad('Price Decimals ควรอยู่ระหว่าง 0 ถึง 8');

      const levels = [];
      if (gridMode === 'usd') {
        for (let p = max; p >= min; p -= spacing) levels.push(p);
      } else {
        const factor = 1 - spacing / 100;
        if (factor >= 1 || factor <= 0) return bad('เปอร์เซ็นต์ Spacing ต้องอยู่ระหว่าง 0% ถึง 100%');
        for (let p = max; p >= min && levels.length <= 5000; p *= factor) levels.push(p);
      }
      if (levels.length > 5000) return bad(`จำนวน Grid หนาแน่นเกินไป (${levels.length.toLocaleString()} ไม้)`);
      if (!levels.length) return bad('ไม่มีระดับราคาใดถูกสร้างขึ้น');

      const validSweeps = $('enableSweep').checked ? sweeps.map((s) => parseFloat(s.price)).filter((p) => !Number.isNaN(p) && p > 0).sort((a, b) => b - a) : [];
      let totalContracts = 0, totalNotional = 0;
      const rows = levels.map((level, i) => {
        const sweep = validSweeps.find((p) => level >= p);
        const execPrice = sweep || level;
        const contracts = sizeType === 'contracts' ? size : size / execPrice;
        const notional = sizeType === 'contracts' ? size * execPrice : size;
        totalContracts += contracts;
        totalNotional += notional;
        return { line: i + 1, level, execPrice, sweep: !!sweep, contracts, avg: totalNotional / totalContracts, cum: totalContracts };
      });

      const avg = totalNotional / totalContracts;
      const liq = Math.max(0, avg - margin / totalContracts);
      const danger = liq > min;
      $('message').className = `card ${danger ? 'danger' : 'safe'}`;
      $('message').innerHTML = `<strong>Estimated Liquidation Price: ${fmt(liq, decimals)}</strong><br><span>${danger ? 'อันตราย: liquidation สูงกว่าไม้ล่างสุด' : 'ปลอดภัย: liquidation ต่ำกว่าไม้ล่างสุด'}</span>`;
      $('mGrids').textContent = rows.length;
      $('mContracts').textContent = fmt(totalContracts, 4);
      $('mValue').textContent = usd(totalNotional);
      $('mAvg').textContent = fmt(avg, decimals);
      $('rows').innerHTML = rows.map((r) => `<tr><td>#${r.line}</td><td>${fmt(r.level, decimals)}</td><td class="${r.sweep ? 'sweep' : ''}">${fmt(r.execPrice, decimals)}${r.sweep ? ' SWEEP' : ''}</td><td>${fmt(r.contracts, 4)}</td><td>${fmt(r.cum, 4)}</td><td>${fmt(r.avg, decimals)}</td></tr>`).join('');
    }

    ['maxPrice', 'minPrice', 'gridSpacing', 'priceDecimals', 'sizeValue', 'totalMargin', 'enableSweep'].forEach((id) => $(id).addEventListener('input', calculate));
    $('modeUsd').addEventListener('click', () => setMode('usd'));
    $('modePct').addEventListener('click', () => setMode('pct'));
    $('sizeContracts').addEventListener('click', () => setSize('contracts'));
    $('sizeUsd').addEventListener('click', () => setSize('usd'));
    $('addSweep').addEventListener('click', () => { sweeps.push({ id: Date.now(), price: '' }); renderSweeps(); calculate(); });
    renderSweeps();
    calculate();
  </script>
</body>
</html>
